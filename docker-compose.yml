version: "3.9"

services:
  web:
    build: .
    container_name: php_app
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      - db
    volumes:

      - ./public:/var/www/html/public
      - ./src:/var/www/html/src
    networks:
      - app_net

  db:
    image: mysql:8.0.36
    container_name: mysql_db
    restart: always
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_net

networks:
  app_net:

volumes:
  db_data: